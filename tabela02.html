<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <h1>Uso de Tabelas grandes</h1>
    <table> 
        <THEAD> 
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </THEAD>
        <TBODY> 
            <tr>    
                <td>São Paulo</td>
                <td>46 081 801</td>
            </tr>
        </TBODY>
        <TFOOT> 
            <tr> </tr>
        </TFOOT>
    </table>
</body>
</html>

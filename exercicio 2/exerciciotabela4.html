<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border: 1px solid black;
            border-collapse:collapse;
        }
        th, td{
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }
        col.Nome{
            background-color: lightblue;
        }
      
    </style>
    <title>Tabelas 4</title>
</head>
<body>
    <table>
        <colgroup>
            <col class="Nome">
            <col class="Idade">
            <col class="Sexo">
            <col class="Profissão">
        </colgroup>
        <caption><strong>Cadastro</strong></caption>
        <THEAD>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Idade</th>
                <th scope="col">Sexo</th>
                <th scope="col">Profissão</th>
            </tr>
        </THEAD>
        <TBODY>
            <tr>
                <td>Maria</td>
                <td>25</td>
                <td>Feminino</td>
                <td>Engenheira</td>
            </tr>
            <tr>
                <td>João</td>
                <td>30</td>
                <td>Masculino</td>
                <td>Médico</td>
            </tr>
            <tr>
                <td>Ana</td>
                <td>22</td>
                <td>Feminino</td>
                <td>Designer</td>
            </tr>
            <tr>
                <td>Pedro</td>
                <td>28</td>
                <td>Masculino</td>
                <td>Advogado</td>
            </tr>
            <tr>
                <td>Carla</td>
                <td>26</td>
                <td>Feminino</td>
                <td>Arquiteta</td>
            </tr>
            <tr>
                <td>Lucas</td>
                <td>24</td>
                <td>Masculino</td>
                <td>Programador</td>
            </tr>
        </TBODY>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        
        td,th{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        THEAD{
          background-color:rgb(31, 58, 58);
          color: rgb(0, 0, 0);
        }
    </style>
</head>
<body>
    <h1>Uso de Tabelas grandes</h1>
    <table> 
        <THEAD> 
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </THEAD>
         <TFOOT> 
            <tr> 
                <th>Total de habitantes</th>
                <td><strong>84 698 789</strong></td>
            </tr>
        </TFOOT>
        <TBODY> 
            <tr>    
                <td>São Paulo</td>
                <td class="num">46 081 801</td>
            </tr>
            <tr>    
                <td>Minas Gerais</td>
                <td class="num">21 292 666</td>
            </tr>
            <tr>    
                <td>Rio de Janeiro</td>
                <td class="num">17 366 189</td>
            </tr>
        </TBODY>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            border: 1px solid black;
            border-collapse:collapse;
        }
        th, td{
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }
        
    </style>
    <title>Tabela Escola</title>
</head>
<body>
    <table>
        <THEAD>
            <tr>
                <th rowspan="2" scope="colgroup">Area</th>
                <th rowspan="2" scope="colgroup">Disciplinas</th>
                <th scope="colgroup" colspan="2">Notas</th>
                <th rowspan="2" scope="colgroup">Medias</th>
            </tr>
            <tr>
                <th>Notas 1</th>
                <th>Notas 2</th>
            </tr>
        </THEAD>
        <TBODY>
            <tr>
                <th scope="rowgroup" rowspan="3">Exatas</th>
                <td>Matematica</td>
                <td>2.2</td>
                <td>5.0</td>
                <td>7.2</td>
            </tr>
            <tr>
                <td>Fisica</td>
                <td>7.0</td>
                <td>3.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td>2.4</td>
                <td>6.3</td>
                <td>8.7</td>
            </tr>
            <tr>
                <th rowspan="3">Humanas</th>
                <td>Historia</td>
                <td>9.0</td>
                <td>1.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>1.4</td>
                <td>5.5</td>
                <td>6.9</td>
            </tr>
            <tr>
                <td>Filosofia</td>
                <td>4.5</td>
                <td>3.1</td>
                <td>7.6</td>
            </tr>
            
        </TBODY> 
    </table>
</body>
</html>

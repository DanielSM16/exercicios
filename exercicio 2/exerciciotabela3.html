<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Escola</title>
</head>
<body>
    <table>
        <THEAD>
            <tr>
                <th>Area</th>
                <th>Disciplinas</th>
                <th>Notas</th>
                <th>Medias</th>
            </tr>
        </THEAD>
        <TBODY>
            <tr>
                <th rowspan="3">Exatas</th>
                <td>Matematica</td>
                <td>8.0</td>
            </tr>
            <tr>
                <td>Fisica</td>
                <td>7.0</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td>9.0</td>
            </tr>
            
        </TBODY> 
    </table>
</body>
</html>

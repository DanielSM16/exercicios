<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício Tabela</title>
    <style>
        table{
            border-collapse: collapse;
        }
        td{
            border: 1px solid black;
            padding: 20px;

        }

    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="3">A</td>
            <td rowspan="3">B</td>
        </tr>
        <tr>
            <td rowspan="3">D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
                <td>H</td>
                <td>G</td>
                
        </tr>
        <tr>
            <td colspan="3">C</td>
        </tr>


    </table>
</body>
</html>
